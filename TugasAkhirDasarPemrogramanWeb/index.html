<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Submission Dicoding</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  >
</head>

<body>

  <!-- HEADER -->
  <header class="navbar-container">

    <!-- LOGO -->
    <div class="logo">
      <img
        src="img/dicoding-header-logo.png"
        alt="Logo Dicoding Indonesia"
      >
    </div>

    <!-- NAVIGATION -->
    <nav class="nav-list">

      <ul>

        <li>
          <a href="#home">Beranda</a>
        </li>

        <li>
          <a href="#about">Tentang</a>
        </li>

        <li>
          <a href="#contact">Kontak</a>
        </li>

        <!-- LINK PROFIL DICODING -->
        <li>
          <a
            href="https://www.dicoding.com/users/ecaa_1036"
            target="_blank"
          >
            Profil Dicoding
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <!-- ARTICLE -->
    <article id="home" class="content">

      <!-- DESKRIPSI -->
      <div class="content-description">

        <h1 class="title">
          Dicoding Indonesia
        </h1>

        <p>
          Dicoding merupakan platform belajar coding dan teknologi
          untuk membantu developer Indonesia menjadi talenta digital
          berstandar global.
        </p>

        <button type="button">
          Lebih Lanjut
        </button>

      </div>

      <!-- IMAGE -->
      <div class="content-image">

        <img
          src="img/circle-g.jpg"
          alt="Logo Dicoding"
        >

      </div>

    </article>

    <!-- ASIDE -->
    <aside>

      <div class="profile">

        <img
          src="img/history.jpg"
          alt="Gedung Bersejarah"
          width="250"
        >

        <h2>Informasi</h2>

        <p>
          Gedung bersejarah.
        </p>

      </div>


      <!-- SOCIAL MEDIA -->
      <div class="social-media">

        <ul>

          <li>
            <a href="#">
              <i class="fab fa-youtube"></i>
            </a>
          </li>

          <li>
            <a href="#">
              <i class="fab fa-instagram"></i>
            </a>
          </li>

          <li>
            <a href="#">
              <i class="fab fa-facebook"></i>
            </a>
          </li>

        </ul>

      </div>

    </aside>

  </main>

  <!-- FOOTER -->
  <footer>

    <p>
      © 2026 Submission Dicoding Dasar Pemrograman Web
    </p>

  </footer>
</body>
</html>
